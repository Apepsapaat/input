<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h3>Total Jumlah: <span id="totalQty">0</span></h3>
<canvas id="chartHarian"></canvas>

<script>
const sheetId = "1Z5c8JLblRDl1gDwbGSUK1uL3-YZxA7-lJIPAuRwSwGg";
const sheetName = "Sheet1";
const url = `https://opensheet.elk.sh/${sheetId}/${sheetName}`;

fetch(url)
  .then(r => r.json())
  .then(data => {
    console.log(data); // cek di console

    let totalQty = 0;
    let perHari = {};

    data.forEach(row => {
      const tanggal = row["TanggalFix"]; // pakai kolom baru
      const jumlah = Number(row["Jumlah"]) || 0;

      if (!tanggal) return;

      totalQty += jumlah;

      if (!perHari[tanggal]) perHari[tanggal] = 0;
      perHari[tanggal] += jumlah;
    });

    document.getElementById("totalQty").innerText = totalQty;

    new Chart(document.getElementById("chartHarian"), {
      type: "line",
      data: {
        labels: Object.keys(perHari),
        datasets: [{
          label: "Jumlah per Hari",
          data: Object.values(perHari)
        }]
      }
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Penjualan</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>Dashboard</h2>

  <h3>Total Jumlah: <span id="totalQty">0</span></h3>

  <canvas id="chartHarian" width="600" height="300"></canvas>

  <script>
    const sheetId = "1Z5c8JLblRDl1gDwbGSUK1uL3-YZxA7-lJIPAuRwSwGg";
    const sheetName = "Sheet1"; // pastikan sama dengan nama tab
    const url = `https://opensheet.elk.sh/${sheetId}/${sheetName}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        console.log(data);

        let totalQty = 0;
        let perHari = {};

        data.forEach(row => {
          const tanggalFull = row["Tanggal"];
          if (!tanggalFull) return;

         const jumlah = Number(row["Jumlah"]) || 0;

          totalQty += jumlah;

          if (!perHari[tanggal]) perHari[tanggal] = 0;
          perHari[tanggal] += jumlah;
        });

        document.getElementById("totalQty").innerText = totalQty;

        new Chart(document.getElementById("chartHarian"), {
          type: "line",
          data: {
            labels: Object.keys(perHari),
            datasets: [{
              label: "Jumlah per Hari",
              data: Object.values(perHari),
              borderWidth: 2,
              tension: 0.3
            }]
          }
        });

      });

    setTimeout(() => location.reload(), 30000);
  </script>
</body>
</html>

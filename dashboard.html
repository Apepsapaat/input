<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Keuangan</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
margin:40px;
}

.card{
display:inline-block;
margin-right:40px;
font-size:20px;
}

h3{
margin:5px 0;
}
</style>

</head>

<body>

<h2>Dashboard Keuangan</h2>

<div class="card">
<h3>Total Masuk</h3>
<span id="totalMasuk">0</span>
</div>

<div class="card">
<h3>Total Keluar</h3>
<span id="totalKeluar">0</span>
</div>

<div class="card">
<h3>Sisa Saldo</h3>
<span id="sisaSaldo">0</span>
</div>

<br><br>

<canvas id="chartHarian" width="700" height="350"></canvas>

<script>

const sheetId = "1Z5c8JLblRDl1gDwbGSUK1uL3-YZxA7-lJIPAuRwSwGg";
const sheetName = "Sheet1";

const url = `https://opensheet.elk.sh/${sheetId}/${sheetName}`;

fetch(url)
.then(res => res.json())
.then(data => {

let totalMasuk = 0;
let totalKeluar = 0;

let perHari = {};

data.forEach(row => {

const tanggal = row["Tanggal"];
if(!tanggal) return;

const masuk = Number(row["Masuk"]) || 0;
const keluar = Number(row["Keluar"]) || 0;

totalMasuk += masuk;
totalKeluar += keluar;

if(!perHari[tanggal]){
perHari[tanggal] = {
masuk:0,
keluar:0
};
}

perHari[tanggal].masuk += masuk;
perHari[tanggal].keluar += keluar;

});

const sisa = totalMasuk - totalKeluar;

document.getElementById("totalMasuk").innerText = totalMasuk.toLocaleString();
document.getElementById("totalKeluar").innerText = totalKeluar.toLocaleString();
document.getElementById("sisaSaldo").innerText = sisa.toLocaleString();

const labels = Object.keys(perHari);

const dataMasuk = labels.map(t => perHari[t].masuk);
const dataKeluar = labels.map(t => perHari[t].keluar);

new Chart(document.getElementById("chartHarian"),{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Masuk",
data:dataMasuk,
borderWidth:2,
tension:0.3
},
{
label:"Keluar",
data:dataKeluar,
borderWidth:2,
tension:0.3
}
]
}
});

});

setTimeout(() => location.reload(), 30000);

</script>

</body>
</html>

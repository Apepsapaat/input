<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Goods In Transit Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f3f3f3;
      padding:20px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .title{
      font-size:42px;
      font-weight:300;
      letter-spacing:1px;
    }

    .total-box{
      width:260px;
      background:white;
      border:1px solid #999;
      border-radius:4px;
      padding:10px;
      text-align:center;
    }

    .total-box small{
      color:#666;
      display:block;
      margin-bottom:5px;
    }

    .total-box h1{
      font-weight:normal;
      font-size:28px;
    }

    .filters{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap:12px;
      margin-bottom:20px;
    }

    .filters select,
    .filters input{
      width:100%;
      padding:12px;
      border:1px solid #999;
      border-radius:4px;
      background:white;
    }

    .tables{
      display:grid;
      grid-template-columns: 1fr 1fr 2fr 3fr;
      gap:12px;
    }

    .table-card{
      background:white;
      border:1px solid #bbb;
      height:500px;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }

    thead{
      position:sticky;
      top:0;
      background:#dce4f2;
      z-index:1;
    }

    th{
      padding:8px;
      text-align:left;
      border-bottom:1px solid #ccc;
    }

    td{
      padding:6px 8px;
      border-bottom:1px solid #eee;
      color:#d60000;
    }

    .right{
      text-align:right;
    }

    .center{
      text-align:center;
    }

    @media(max-width:1200px){

      .tables{
        grid-template-columns:1fr;
      }

      .filters{
        grid-template-columns:1fr 1fr;
      }

    }
  </style>
</head>

<body>

  <div class="header">

    <div class="title">
      GOODS IN TRANSIT
    </div>

    <div class="total-box">
      <small>TOTAL_COST</small>
      <h1 id="totalCost">0</h1>
    </div>

  </div>

  <!-- FILTER -->
  <div class="filters">

    <select id="filterFrom">
      <option value="">FROM</option>
    </select>

    <select id="filterDest">
      <option value="">DESTINATION</option>
    </select>

    <select id="filterSubclass">
      <option value="">SUBCLASS</option>
    </select>

    <input type="text" id="searchArtdesc" placeholder="Search ARTDESC">

    <input type="text" id="searchMutasi" placeholder="Search MUTASI_NO">

    <input type="text" id="searchDN" placeholder="Search DN_NO">

  </div>

  <!-- TABLE -->
  <div class="tables">

    <!-- TANGGAL -->
    <div class="table-card">

      <table id="tanggalTable">

        <thead>
          <tr>
            <th>TANGGAL</th>
            <th class="right">COST</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>

    </div>

    <!-- FROM -->
    <div class="table-card">

      <table id="fromTable">

        <thead>
          <tr>
            <th>FROM</th>
            <th class="right">COST</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>

    </div>

    <!-- ARTDESC -->
    <div class="table-card">

      <table id="artTable">

        <thead>
          <tr>
            <th>ARTDESC</th>
            <th class="center">QTY</th>
            <th class="right">COST</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>

    </div>

    <!-- DETAIL -->
    <div class="table-card">

      <table id="detailTable">

        <thead>
          <tr>
            <th>TANGGAL</th>
            <th>MUTASI_NO</th>
            <th>FROM</th>
            <th>TO</th>
            <th>ARTDESC</th>
            <th>Qty</th>
            <th>Cost</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>

    </div>

  </div>

<script>

  // =========================================
  // GANTI DENGAN URL GOOGLE SHEET KAMU
  // =========================================

  const sheetURL =
  "https://opensheet.elk.sh/14KYOozrOSrbc8rgEL_KWOPF4U4g0IEZ-2IaYKxNNvoU/GIT";

  let rawData = [];

  // =========================================
  // LOAD DATA
  // =========================================

  async function loadData(){

    try{

      const res = await fetch(sheetURL);
      const data = await res.json();

      rawData = data;

      fillFilter(data);
      renderDashboard(data);

    }catch(err){

      console.log(err);
      alert("Gagal mengambil data spreadsheet");

    }

  }

  // =========================================
  // FORMAT NUMBER
  // =========================================

  function formatNumber(num){

    return Number(num || 0).toLocaleString("id-ID");

  }

  // =========================================
  // RENDER DASHBOARD
  // =========================================

  function renderDashboard(data){

    // ==========================
    // TOTAL COST
    // ==========================

    const totalCost = data.reduce((a,b)=>

      a + Number(b.TOTAL_COST || 0)

    ,0);

    document.getElementById("totalCost")
      .innerHTML = formatNumber(totalCost);

    // ==========================
    // DETAIL TABLE
    // ==========================

    const detailBody =
      document.querySelector("#detailTable tbody");

    detailBody.innerHTML = "";

    data.forEach(row=>{

      detailBody.innerHTML += `
        <tr>
          <td>${row.TANGGAL || ""}</td>
          <td>${row.MUTASI_NO || ""}</td>
          <td>${row.FROM_NAME || ""}</td>
          <td>${row.DEST_NAME || ""}</td>
          <td>${row.ARTDESC || ""}</td>
          <td class="center">
            ${formatNumber(row.TOTAL_QTY)}
          </td>
          <td class="right">
            ${formatNumber(row.TOTAL_COST)}
          </td>
        </tr>
      `;

    });

    // ==========================
    // GROUP TANGGAL
    // ==========================

    const tanggalMap = {};

    data.forEach(r=>{

      if(!tanggalMap[r.TANGGAL]){

        tanggalMap[r.TANGGAL] = 0;

      }

      tanggalMap[r.TANGGAL] +=
        Number(r.TOTAL_COST || 0);

    });

    const tanggalBody =
      document.querySelector("#tanggalTable tbody");

    tanggalBody.innerHTML = "";

    Object.keys(tanggalMap).forEach(t=>{

      tanggalBody.innerHTML += `
        <tr>
          <td>${t}</td>
          <td class="right">
            ${formatNumber(tanggalMap[t])}
          </td>
        </tr>
      `;

    });

    // ==========================
    // GROUP FROM
    // ==========================

    const fromMap = {};

    data.forEach(r=>{

      if(!fromMap[r.FROM_NAME]){

        fromMap[r.FROM_NAME] = 0;

      }

      fromMap[r.FROM_NAME] +=
        Number(r.TOTAL_COST || 0);

    });

    const fromBody =
      document.querySelector("#fromTable tbody");

    fromBody.innerHTML = "";

    Object.keys(fromMap).forEach(f=>{

      fromBody.innerHTML += `
        <tr>
          <td>${f}</td>
          <td class="right">
            ${formatNumber(fromMap[f])}
          </td>
        </tr>
      `;

    });

    // ==========================
    // GROUP ARTDESC
    // ==========================

    const artMap = {};

    data.forEach(r=>{

      if(!artMap[r.ARTDESC]){

        artMap[r.ARTDESC] = {

          qty:0,
          cost:0

        };

      }

      artMap[r.ARTDESC].qty +=
        Number(r.TOTAL_QTY || 0);

      artMap[r.ARTDESC].cost +=
        Number(r.TOTAL_COST || 0);

    });

    const artBody =
      document.querySelector("#artTable tbody");

    artBody.innerHTML = "";

    Object.keys(artMap).forEach(a=>{

      artBody.innerHTML += `
        <tr>
          <td>${a}</td>

          <td class="center">
            ${formatNumber(artMap[a].qty)}
          </td>

          <td class="right">
            ${formatNumber(artMap[a].cost)}
          </td>
        </tr>
      `;

    });

  }

  // =========================================
  // FILL FILTER
  // =========================================

  function fillFilter(data){

    const fromSet =
      [...new Set(data.map(d=>d.FROM_NAME))];

    const destSet =
      [...new Set(data.map(d=>d.DEST_NAME))];

    const subclassSet =
      [...new Set(data.map(d=>d.SUBCLASS))];

    fromSet.forEach(v=>{

      filterFrom.innerHTML +=
        `<option value="${v}">${v}</option>`;

    });

    destSet.forEach(v=>{

      filterDest.innerHTML +=
        `<option value="${v}">${v}</option>`;

    });

    subclassSet.forEach(v=>{

      filterSubclass.innerHTML +=
        `<option value="${v}">${v}</option>`;

    });

  }

  // =========================================
  // APPLY FILTER
  // =========================================

  function applyFilter(){

    const fromVal =
      document.getElementById("filterFrom").value;

    const destVal =
      document.getElementById("filterDest").value;

    const subclassVal =
      document.getElementById("filterSubclass").value;

    const artVal =
      document.getElementById("searchArtdesc")
      .value.toLowerCase();

    const mutasiVal =
      document.getElementById("searchMutasi")
      .value.toLowerCase();

    const dnVal =
      document.getElementById("searchDN")
      .value.toLowerCase();

    const filtered = rawData.filter(r=>{

      return (

        (!fromVal ||
          r.FROM_NAME === fromVal)

        &&

        (!destVal ||
          r.DEST_NAME === destVal)

        &&

        (!subclassVal ||
          r.SUBCLASS === subclassVal)

        &&

        (!artVal ||
          (r.ARTDESC || "")
          .toLowerCase()
          .includes(artVal))

        &&

        (!mutasiVal ||
          (r.MUTASI_NO || "")
          .toLowerCase()
          .includes(mutasiVal))

        &&

        (!dnVal ||
          (r.DN_NO || "")
          .toLowerCase()
          .includes(dnVal))

      );

    });

    renderDashboard(filtered);

  }

  // =========================================
  // EVENT FILTER
  // =========================================

  document
    .querySelectorAll("select,input")
    .forEach(el=>{

      el.addEventListener("input", applyFilter);

    });

  // =========================================
  // START
  // =========================================

  loadData();

</script>

</body>
</html>

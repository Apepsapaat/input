<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Barang - Login</title>
  <!-- SCRIPT UTK LIBRARY SCANNER BARCODE (PILIH VERSI STABIL MINI) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background-color: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0d47a1;
    }
    /* Style Tambahan untuk Scanner */
    .btn-scan {
      background-color: #2e7d32;
      margin-top: 0;
      margin-bottom: 15px;
    }
    .btn-scan:hover {
      background-color: #1b5e20;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 15px;
      border: 1px solid #ccc !important;
      background-color: #fafafa;
    }
    /* Merapikan tombol bawaan library di dalam kotak scanner */
    #reader button {
      background-color: #f44336;
      color: white;
      padding: 6px 10px;
      margin: 5px auto;
      width: auto;
      display: block;
    }
    #reader select {
      padding: 5px;
      margin: 5px auto;
      display: block;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="loginForm">
    <h2>Login</h2>
    <input type="text" id="userId" placeholder="User ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>
  </div>

  <div id="mainForm" style="display:none;">
    <h2>Form Input Barang</h2>
    
    <!-- TEMPAT KAMERA AKAN MUNCUL -->
    <div id="reader" style="display: none;"></div>

    <form id="returForm">
      <div class="input-group">
        <input type="text" name="nama_barang" id="nama_barang" placeholder="Nama Barang / Barcode" required>
        <button type="button" class="btn-scan" id="btnScanAction" onclick="toggleScan()">📷 Buka Kamera Scan</button>
      </div>
      <input type="number" name="jumlah" placeholder="Jumlah" required>
      <input type="text" name="dus" placeholder="Dus" required>
      <input type="text" name="palet" placeholder="Palet" required>
      <button type="submit">Kirim</button>
    </form>
  </div>
</div>

<script>
  // Konfigurasi Login
  const VALID_USER = "sapan";
  const VALID_PASS = "12345";

  function login() {
    const user = document.getElementById("userId").value;
    const pass = document.getElementById("password").value;

    if (user === VALID_USER && pass === VALID_PASS) {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("mainForm").style.display = "block";
    } else {
      alert("User ID atau Password salah");
    }
  }

  // LOGIKA SCANNER BARCODE BARU (LEBIH STABIL)
  let scannerInstance = null;

  function toggleScan() {
    const readerDiv = document.getElementById('reader');
    const btnScan = document.getElementById('btnScanAction');

    // Jika sedang tidak aktif, kita aktifkan
    if (readerDiv.style.display === 'none') {
      readerDiv.style.display = 'block';
      btnScan.innerText = "❌ Tutup Kamera Scan";
      btnScan.style.backgroundColor = "#d32f2f";

      if (!scannerInstance) {
        // Membuat scanner baru di elemen #reader
        scannerInstance = new Html5QrcodeScanner("reader", { 
          fps: 10, 
          qrbox: { width: 250, height: 150 },
          rememberLastUsedCamera: true
        }, /* verbose= */ false);
      }
      
      // Jalankan scanner render
      scannerInstance.render(onScanSuccess, onScanError);
    } else {
      // Jika sedang aktif, kita matikan
      matikanScanner();
    }
  }

  function onScanSuccess(decodedText, decodedResult) {
    // 1. Masukkan hasil ke input nama barang
    document.getElementById('nama_barang').value = decodedText;
    // 2. Matikan kamera secara otomatis setelah sukses mendeteksi
    matikanScanner();
  }

  function onScanError(errorMessage) {
    // Biarkan kosong agar konsol log browser tidak penuh saat mencari kode batang
  }

  function matikanScanner() {
    const readerDiv = document.getElementById('reader');
    const btnScan = document.getElementById('btnScanAction');
    
    if (scannerInstance) {
      scannerInstance.clear().then(() => {
        readerDiv.style.display = 'none';
        btnScan.innerText = "📷 Buka Kamera Scan";
        btnScan.style.backgroundColor = "#2e7d32";
      }).catch(err => {
        console.error("Gagal membersihkan scanner:", err);
        // Paksa sembunyikan jika hang
        readerDiv.style.display = 'none';
      });
    }
  }

  // Konfigurasi Pengiriman Google Sheets (Tanpa Jeda)
  const scriptURL = 'https://google.com';
  const form = document.getElementById('returForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // Pastikan kamera mati saat form dikirim
    matikanScanner();

    const formData = new FormData(form);
    const sekarang = new Date();
    const opsiWaktu = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const tanggalMasuk = Clinical = sekarang.toLocaleString('id-ID', opsiWaktu);
    
    formData.append('tanggal_masuk', tanggalMasuk);

    alert("Data berhasil dikirim!"); 
    form.reset();

    fetch(scriptURL, { method: 'POST', body: formData })
      .then(response => {
        console.log("Data sukses tercatat di Google Sheets:", response);
      })
      .catch(error => {
        console.error("Gagal sinkronisasi ke latar belakang:", error);
      });
  });
</script>

</body>
</html>

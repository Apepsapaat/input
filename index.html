<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Barang - Login</title>
  <!-- SCRIPT UNTUK LIBRARY SCANNER BARCODE -->
  <script src="https://unpkg.com" type="text/javascript"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background-color: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0d47a1;
    }
    /* Style Tambahan untuk Scanner */
    .input-group {
      position: relative;
    }
    .btn-scan {
      background-color: #2e7d32;
      margin-top: 0;
      margin-bottom: 15px;
    }
    .btn-scan:hover {
      background-color: #1b5e20;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 15px;
      border: none !important; /* Menghilangkan border default library */
    }
  </style>
</head>
<body>

<div class="container">
  <div id="loginForm">
    <h2>Login</h2>
    <input type="text" id="userId" placeholder="User ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>
  </div>

  <div id="mainForm" style="display:none;">
    <h2>Form Input Barang</h2>
    
    <!-- TEMPAT KAMERA AKAN MUNCUL -->
    <div id="reader" style="display: none;"></div>

    <form id="returForm">
      <div class="input-group">
        <input type="text" name="nama_barang" id="nama_barang" placeholder="Nama Barang / Barcode" required>
        <button type="button" class="btn-scan" onclick="startScan()">📷 Scan Barcode via Kamera</button>
      </div>
      <input type="number" name="jumlah" placeholder="Jumlah" required>
      <input type="text" name="dus" placeholder="Dus" required>
      <input type="text" name="palet" placeholder="Palet" required>
      <button type="submit">Kirim</button>
    </form>
  </div>
</div>

<script>
  // Konfigurasi Login
  const VALID_USER = "sapan";
  const VALID_PASS = "12345";

  function login() {
    const user = document.getElementById("userId").value;
    const pass = document.getElementById("password").value;

    if (user === VALID_USER && pass === VALID_PASS) {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("mainForm").style.display = "block";
    } else {
      alert("User ID atau Password salah");
    }
  }

  // LOGIKA SCANNER BARCODE
  let html5QrcodeScanner = null;

  function startScan() {
    const readerDiv = document.getElementById('reader');
    readerDiv.style.display = 'block'; // Tampilkan kotak kamera

    // Inisialisasi scanner jika belum ada
    if (!html5QrcodeScanner) {
      html5QrcodeScanner = new Html5Qrcode("reader");
    }

    // Jalankan kamera belakang (environment)
    html5QrcodeScanner.start(
      { facingMode: "environment" }, 
      {
        fps: 10,    // Kecepatan scan per detik
        qrbox: { width: 250, height: 150 } // Area kotak fokus scan
      },
      (decodedText, decodedResult) => {
        // JIKA BARCODE BERHASIL TERBACA:
        document.getElementById('nama_barang').value = decodedText; // Masukkan hasil ke input
        stopScan(); // Matikan kamera otomatis
      },
      (errorMessage) => {
        // Abaikan error pencarian berkala agar tidak memenuhi log
      }
    ).catch((err) => {
      alert("Gagal membuka kamera: " + err);
      readerDiv.style.display = 'none';
    });
  }

  function stopScan() {
    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
      html5QrcodeScanner.stop().then(() => {
        document.getElementById('reader').style.style.display = 'none';
      }).catch((err) => {
        console.error("Gagal menghentikan kamera", err);
      });
    } else {
      document.getElementById('reader').style.display = 'none';
    }
  }

  // Konfigurasi Pengiriman Google Sheets (Tanpa Jeda)
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxOX4KSEyBZ7WUUQyvUP9BU3uu7TnBr0Ikhim50gg_4WRGcgzNw2kDwePVLMvLpHmY/exec';
  const form = document.getElementById('returForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // Pastikan kamera mati saat form dikirim
    stopScan();

    const formData = new FormData(form);
    const sekarang = new Date();
    const opsiWaktu = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const tanggalMasuk = sekarang.toLocaleString('id-ID', opsiWaktu);
    
    formData.append('tanggal_masuk', tanggalMasuk);

    alert("Data berhasil dikirim!"); 
    form.reset();

    fetch(scriptURL, { method: 'POST', body: formData })
      .then(response => {
        console.log("Data sukses tercatat di Google Sheets:", response);
      })
      .catch(error => {
        console.error("Gagal sinkronisasi ke latar belakang:", error);
      });
  });
</script>

</body>
</html>
